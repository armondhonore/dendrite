application:
  name: dendrite
  pods:
  - name: app
    image: mirror.gcr.io/matrixdotorg/synapse:latest
    path: /
    servicePorts:
    - 8008
    vars:
      SYNAPSE_SERVER_NAME: relaxed-weasel-dendrite.cloud.nexlayer.ai
      SYNAPSE_REPORT_STATS: "no"
      SYNAPSE_ENABLE_REGISTRATION: "true"
      SYNAPSE_NO_TLS: "true"
    volumes:
    - name: synapse-data
      mountPath: /data
      size: 5Gi
