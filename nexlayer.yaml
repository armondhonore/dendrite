application:
  name: dendrite
  pods:
  - name: app
    image: ghcr.io/famedly/conduit:latest
    path: /
    servicePorts:
    - 6167
    vars:
      CONDUIT_SERVER_NAME: relaxed-weasel-dendrite.cloud.nexlayer.ai
      CONDUIT_DATABASE_BACKEND: rocksdb
      CONDUIT_DATABASE_PATH: /var/lib/conduit
      CONDUIT_PORT: "6167"
      CONDUIT_ALLOW_REGISTRATION: "true"
      CONDUIT_ALLOW_FEDERATION: "false"
      CONDUIT_CONFIG: ""
    volumes:
    - name: conduit-data
      mountPath: /var/lib/conduit
      size: 5Gi
